name: XRP CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi script deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEYS }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            export PATH=$PATH:/usr/local/go/bin:$(go env GOPATH)/bin:/usr/bin

            cd /www/wwwroot/xrp.gdv.my.id/ekserpi

            # Tarik kode terbaru
            git pull origin main

            # --- DEPLOY BACKEND (GOLANG) ---
            cd backend
            # Build file binary golang
            /usr/local/go/bin/go build -o main .
            pm2 restart xrp-api

            # --- DEPLOY FRONTEND (NEXT.JS) ---
            cd ..
            npm install
            npm run build
            # Restart frontend di PM2
            pm2 restart xrp-app
